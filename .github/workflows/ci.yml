name: CI Pipeline

on:
    push:
        branches: 
            - main
    pull_request:
        branches:
            - main

jobs:

    # ─────────────────────────────────────────
    # JOB 1 — Unit Tests
    # Runs first. No Docker, no real services.
    # ─────────────────────────────────────────
    unit_tests:
        name: Unit Tests
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.13"

            - name: Install Dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt
                  pip install pytest pytest-asyncio

            - name: Run Unit Tests
              env:
                  OPENAI_API_KEY: test-key
                  QDRANT_URL: http://localhost:6333
                  QDRANT_API_KEY: test-key
                  LOG_LEVEL: WARNING
                  PYTHONPATH: .
              run: |
                  pytest tests/ -v --tb=short --asyncio-mode=auto

    # ─────────────────────────────────────────
    # JOB 2 — Docker Build and Test (original)
    # ─────────────────────────────────────────
    docker_build_test:
        name: Docker Build and Test
        runs-on : ubuntu-latest
        needs: unit_tests

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build Docker Image
              uses: docker/build-push-action@v5
              with:
                context: .
                push: false
                tags: rag-qa-system:${{ github.sha }}
                cache-from: type=gha
                cache-to: type=gha,mode=max
            
            - name: Test Docker Image
              run : |
               docker build -t rag-qa-system:latest .
               docker run --rm\
                -e OPENAI_API_KEY=test-key\
                -e QDRANT_URL=http://localhost:6333\
                -e QDRANT_API_KEY=test-key \
                rag-qa-system:latest python -c "from app.main import app; print('App loaded successfully')"

                